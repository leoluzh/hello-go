version: 2

updates:
  # Dependências Go
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies
      - go

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    commit-message:
      prefix: "ci(deps)"
    labels:
      - dependencies
      - github-actions

  # Imagem base do Dockerfile
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    commit-message:
      prefix: "chore(docker)"
    labels:
      - dependencies
      - docker
