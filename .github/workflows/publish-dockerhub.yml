name: Publish Image → Docker Hub

on:
  push:
    tags:
      - "v*.*.*"   # dispara apenas em releases: v1.0.0, v2.1.3, etc.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag da imagem (ex: v1.0.0)"
        required: true
        default: "latest"

env:
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/hello-go

jobs:
  build-and-push:
    name: Build & Push → Docker Hub
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------------------
      # 1. Checkout
      # --------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # --------------------------------------------------------
      # 2. Configura QEMU (multi-arch: linux/amd64 + linux/arm64)
      # --------------------------------------------------------
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # --------------------------------------------------------
      # 3. Configura Docker Buildx
      # --------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # --------------------------------------------------------
      # 4. Login no Docker Hub
      #    Secrets necessários no repositório:
      #      DOCKERHUB_USERNAME  → seu usuário Docker Hub
      #      DOCKERHUB_TOKEN     → Access Token (hub.docker.com/settings/security)
      # --------------------------------------------------------
      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # --------------------------------------------------------
      # 5. Extrai metadados (tags e labels)
      #    - tag v1.2.3 → usuario/hello-go:1.2.3
      #                 → usuario/hello-go:1.2
      #                 → usuario/hello-go:latest
      # --------------------------------------------------------
      - name: Extrai metadados (tags e labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      # --------------------------------------------------------
      # 6. Build + Push
      # --------------------------------------------------------
      - name: Build e Push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --------------------------------------------------------
      # 7. Atualiza descrição do repositório no Docker Hub
      #    (usa o conteúdo do README.md)
      # --------------------------------------------------------
      - name: Atualiza descrição no Docker Hub
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_IMAGE }}