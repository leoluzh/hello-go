name: Publish Image → GHCR

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # ex: meuusuario/hello-go

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # necessário para publicar no GHCR

    steps:
      # --------------------------------------------------------
      # 1. Checkout
      # --------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # --------------------------------------------------------
      # 2. Configura QEMU (multi-arch: linux/amd64 + linux/arm64)
      # --------------------------------------------------------
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # --------------------------------------------------------
      # 3. Configura Docker Buildx
      # --------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # --------------------------------------------------------
      # 4. Login no GHCR
      #    GITHUB_TOKEN é gerado automaticamente pelo Actions
      # --------------------------------------------------------
      - name: Login no GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --------------------------------------------------------
      # 5. Extrai metadados (tags e labels)
      #    - branch main    → ghcr.io/usuario/hello-go:main
      #    - tag v1.2.3     → ghcr.io/usuario/hello-go:1.2.3
      #                     → ghcr.io/usuario/hello-go:latest
      #    - pull_request   → ghcr.io/usuario/hello-go:pr-42
      # --------------------------------------------------------
      - name: Extrai metadados (tags e labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      # --------------------------------------------------------
      # 6. Build + Push
      # --------------------------------------------------------
      - name: Build e Push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max