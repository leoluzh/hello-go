name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 6 * * 1"   # toda segunda-feira às 06h UTC

jobs:
  analyze:
    name: Análise CodeQL
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Inicializa CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go
          queries: security-and-quality

      - name: Build para análise
        run: CGO_ENABLED=0 go build ./...

      - name: Executa análise CodeQL
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"
